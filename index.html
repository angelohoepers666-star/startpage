<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:  #0d0d0f;
    --bg2: #131316;
    --bg3: #1a1a1f;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --text: #e8e8ea;
    --muted: #6b6b78;
    --accent: #7c6af7;
    --accent2: #4fd1b0;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-display); }

  body { display: flex; flex-direction: column; min-height: 100vh; padding: 2.5rem 3rem 2.5rem; gap: 2.2rem; }

  @keyframes fadein { to { opacity: 1; } }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* TOP BAR */
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 2rem; }

  .clock { font-family: var(--font-mono); font-size: clamp(3rem, 6vw, 5.5rem); font-weight: 300; letter-spacing: -0.03em; line-height: 1; }
  .clock .sep { color: var(--accent); animation: blink 1s step-end infinite; }

  .date-line { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); margin-top: 0.4rem; letter-spacing: 0.08em; text-transform: uppercase; }

  .splash { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent2); letter-spacing: 0.04em; margin-top: 0.65rem; border-left: 2px solid var(--accent2); padding-left: 0.85rem; max-width: 580px; line-height: 1.5; opacity: 0; animation: fadein 0.6s ease 0.3s forwards; }

  /* WEATHER */
  .weather-block { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; min-width: 180px; }
  .weather-main { display: flex; align-items: center; gap: 0.75rem; }
  .weather-icon { font-size: 2.2rem; line-height: 1; }
  .weather-temp { font-family: var(--font-mono); font-size: 2.2rem; font-weight: 300; line-height: 1; }
  .weather-desc { font-size: 0.75rem; color: var(--muted); text-align: right; font-family: var(--font-mono); letter-spacing: 0.05em; }
  .weather-city { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-mono); }
  .weather-loading, .weather-error { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); text-align: right; line-height: 1.6; }

  /* SEARCH */
  .search-wrap { opacity: 0; animation: fadein 0.5s ease 0.15s forwards; }

  .search-form { display: flex; align-items: stretch; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; max-width: 680px; }
  .search-form:focus-within { border-color: rgba(124,106,247,0.5); box-shadow: 0 0 0 3px rgba(124,106,247,0.08); }

  .search-icon { padding: 0 1rem 0 1.1rem; color: var(--muted); display: flex; align-items: center; flex-shrink: 0; }

  .search-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 0.88rem; padding: 0.85rem 0; letter-spacing: 0.02em; }
  .search-input::placeholder { color: var(--muted); }

  .search-btn { background: var(--accent); border: none; color: #fff; font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.08em; padding: 0 1.25rem; cursor: pointer; opacity: 0.9; transition: opacity 0.15s; align-self: stretch; }
  .search-btn:hover { opacity: 1; }

  /* LINKS GRID */
  main { display: flex; flex-direction: column; gap: 1.8rem; opacity: 0; animation: fadein 0.5s ease 0.2s forwards; }

  .category { display: flex; flex-direction: column; gap: 0.65rem; }

  .category-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 0.6rem; }
  .category-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.6rem; }

  .card { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; padding: 1rem 0.75rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; text-decoration: none; color: var(--text); transition: background 0.15s, border-color 0.15s, transform 0.1s; min-height: 88px; }
  .card:hover { background: var(--bg3); border-color: var(--border-hover); transform: translateY(-2px); }
  .card:active { transform: translateY(0); }

  .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .card-name { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.02em; text-align: center; color: var(--text); line-height: 1.3; }

  /* RSS NEWS */
  .news-section { display: flex; flex-direction: column; gap: 0.9rem; opacity: 0; animation: fadein 0.5s ease 0.35s forwards; padding-top: 0.5rem; }

  .news-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }

  .news-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 0.6rem; }

  .rss-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

  .news-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .news-tab { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.06em; color: var(--muted); background: transparent; border: 1px solid var(--border); border-radius: 5px; padding: 0.2rem 0.65rem; cursor: pointer; transition: all 0.15s; }
  .news-tab:hover { color: var(--text); border-color: var(--border-hover); }
  .news-tab.active { color: var(--accent2); border-color: var(--accent2); background: rgba(79,209,176,0.06); }

  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.6rem; }

  .news-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; text-decoration: none; display: flex; flex-direction: column; gap: 0.35rem; transition: background 0.15s, border-color 0.15s; }
  .news-card:hover { background: var(--bg3); border-color: var(--border-hover); }

  .news-source { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .news-title { font-size: 0.82rem; font-weight: 500; color: var(--text); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .news-date { font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }

  .news-loading, .news-empty { font-family: var(--font-mono); font-size: 0.78rem; color: var(--muted); padding: 1rem 0; }
  .news-loading span { animation: blink 1.2s step-end infinite; }

  /* FOOTER */
  footer { font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em; opacity: 0.35; text-align: center; padding-top: 0.5rem; margin-top: auto; }
</style>
</head>

// CLOCK
// ═══════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').innerHTML = `${h}<span class="sep">:</span>${m}`;
  const days   = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('datestr').textContent =
    `${days[now.getDay()]} — ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

(function() {
  const now = new Date();
  const seed = now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate();
  document.getElementById('splash').textContent = SPLASHES[seed % SPLASHES.length];
})();

// WEATHER (Open-Meteo, sem API key)
// ═══════════════════════════════════════════════════
const WMO_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WMO_DESC  = {0:'Céu limpo',1:'Principalmente limpo',2:'Parcialmente nublado',3:'Nublado',45:'Névoa',48:'Névoa c/ geada',51:'Chuvisco leve',53:'Chuvisco',55:'Chuvisco forte',61:'Chuva leve',63:'Chuva moderada',65:'Chuva forte',71:'Neve leve',73:'Neve moderada',75:'Neve forte',80:'Chuva leve',81:'Chuva moderada',82:'Chuva forte',95:'Tempestade',96:'Tempestade c/ granizo',99:'Tempestade forte'};

async function fetchWeather() {
  const wb = document.getElementById('weather-block');
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&current=temperature_2m,weathercode,apparent_temperature&timezone=America%2FSao_Paulo`);
    if (!res.ok) throw new Error();
    const d = await res.json();
    const temp = Math.round(d.current.temperature_2m);
    const feel = Math.round(d.current.apparent_temperature);
    const code = d.current.weathercode;
    wb.innerHTML = `
      <div class="weather-main">
        <span class="weather-icon">${WMO_ICONS[code]||'🌡️'}</span>
        <span class="weather-temp">${temp}°</span>
      </div>
      <div class="weather-desc">${WMO_DESC[code]||'Clima'} &mdash; Sensação ${feel}°</div>
      <div class="weather-city">${WEATHER_CITY}</div>`;
  } catch {
    wb.innerHTML = `<div class="weather-error">clima indisponível<br><small style="opacity:.5">verifique a conexão</small></div>`;
  }
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

    sec.className = 'category';
    sec.innerHTML = `<div class="category-label">${cat.label}</div>`;
    const cards = document.createElement('div');
    cards.className = 'cards';
    cat.links.forEach(link => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = "#";
      a.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = link.url;
      });
      a.innerHTML = `
        <div class="card-icon" style="background:${hexToRgba(link.color||'#e8e8ea',0.13)}">
          <span style="font-size:18px">${link.icon||'🔗'}</span>
        </div>
        <div class="card-name">${link.name}</div>`;
      cards.appendChild(a);
    });
    sec.appendChild(cards);
    grid.appendChild(sec);
  });
})();

// ═══════════════════════════════════════════════════
// RSS NEWS
// Proxy: allorigins.win — contorna CORS sem API key
// Parse: DOMParser nativo do browser (sem libs)
// ═══════════════════════════════════════════════════
let currentFeedIdx = 0;
const feedCache = {};

function timeAgo(dateStr) {
  const diff  = Date.now() - new Date(dateStr).getTime();
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(mins / 60);
  const days  = Math.floor(hours / 24);
  if (days  > 0) return `${days}d atrás`;
  if (hours > 0) return `${hours}h atrás`;
  if (mins  > 0) return `${mins}min atrás`;
  return 'agora';
}

function parseRSSXML(xmlStr) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(xmlStr, 'text/xml');
  // suporte a RSS 2.0 e Atom
  const isAtom = doc.querySelector('feed') !== null;
  const items  = [];
  if (isAtom) {
    doc.querySelectorAll('entry').forEach(entry => {
      const title   = entry.querySelector('title')?.textContent?.trim() || '';
      const linkEl  = entry.querySelector('link[rel="alternate"], link');
      const link    = linkEl?.getAttribute('href') || '';
      const pubDate = entry.querySelector('published, updated')?.textContent || '';
      if (title && link) items.push({ title, link, pubDate });
    });
  } else {
    doc.querySelectorAll('item').forEach(item => {
      const title   = item.querySelector('title')?.textContent?.trim() || '';
      const link    = item.querySelector('link')?.textContent?.trim()
                   || item.querySelector('guid')?.textContent?.trim() || '';
      const pubDate = item.querySelector('pubDate')?.textContent || '';
      if (title && link) items.push({ title, link, pubDate });
    });
  }
  return items;
}

function renderNews(items, source) {
  const grid = document.getElementById('news-grid');
  if (!items || items.length === 0) {
    grid.innerHTML = `<div class="news-empty">nenhuma notícia encontrada.</div>`;
    return;
  }
  grid.innerHTML = '';
  items.slice(0, 12).forEach(item => {
    const card = document.createElement('a');
    card.className = 'news-card';
    card.href = item.link;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    const pubDate = item.pubDate ? timeAgo(item.pubDate) : '';
    // sanitize title (strip HTML tags que alguns feeds incluem)
    const title = item.title.replace(/<[^>]*>/g, '');
    card.innerHTML = `
      <div class="news-source">${source}</div>
      <div class="news-title">${title}</div>
      ${pubDate ? `<div class="news-date">${pubDate}</div>` : ''}`;
    grid.appendChild(card);
  });
}

async function loadFeed(idx) {
  const feed = RSS_FEEDS[idx];
  if (!feed) return;
  document.querySelectorAll('.news-tab').forEach((t,i) => t.classList.toggle('active', i === idx));
  if (feedCache[idx]) { renderNews(feedCache[idx], feed.label); return; }

  document.getElementById('news-grid').innerHTML =
    `<div class="news-loading">carregando ${feed.label}<span>...</span></div>`;

  // allorigins retorna JSON com campo "contents" contendo o XML bruto
  const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`;
  try {
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('http ' + res.status);
    const json = await res.json();
    if (!json.contents) throw new Error('empty');
    const items = parseRSSXML(json.contents);
    if (!items.length) throw new Error('no items');
    feedCache[idx] = items;
    renderNews(items, feed.label);
  } catch(e) {
    document.getElementById('news-grid').innerHTML =
      `<div class="news-empty">não foi possível carregar o feed <strong style="color:var(--text)">${feed.label}</strong>.<br>
       <span style="font-size:.7rem;opacity:.5">tente outro feed ou verifique a conexão.</span></div>`;
  }
}

(function buildTabs() {
  const tabs = document.getElementById('news-tabs');
  RSS_FEEDS.forEach((feed, idx) => {
    const btn = document.createElement('button');
    btn.className = 'news-tab' + (idx === 0 ? ' active' : '');
    btn.textContent = feed.label;
    btn.addEventListener('click', () => { currentFeedIdx = idx; loadFeed(idx); });
    tabs.appendChild(btn);
  });
  loadFeed(0);
})();

// Limpa cache e recarrega a cada 15 minutos
setInterval(() => {
  Object.keys(feedCache).forEach(k => delete feedCache[k]);
  loadFeed(currentFeedIdx);
}, 15 * 60 * 1000);

document.getElementById('search-input').focus();
</script>
